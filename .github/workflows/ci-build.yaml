# Build on Ubuntu with GCC and Clang, plus a Windows Visual Studio build.
name: CI Build

on:
  push:
    paths-ignore:
      - '.github/ISSUE_TEMPLATE.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/workflows/development-db-dump.yaml'
      - '.github/workflows/pr-sql-check.yaml'
      - '.gitignore'
      - 'CONTRIBUTING.md'
      - 'LICENSE'
      - 'README.md'
      - 'sql/**'

  pull_request:
    paths-ignore:
      - '.github/ISSUE_TEMPLATE.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/workflows/development-db-dump.yaml'
      - '.github/workflows/pr-sql-check.yaml'
      - '.gitignore'
      - 'CONTRIBUTING.md'
      - 'LICENSE'
      - 'README.md'
      - 'sql/**'

jobs:
  build:
    name: Build on ${{ matrix.job_name }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            c_compiler: gcc
            cxx_compiler: g++
            compiler: gcc
            job_name: Ubuntu GCC
          - os: ubuntu-24.04
            c_compiler: clang
            cxx_compiler: clang++
            compiler: clang
            job_name: Ubuntu Clang
          - os: windows-2022
            job_name: Windows Visual Studio

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Ubuntu build dependencies
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt update
          sudo apt install -y --no-install-recommends \
            build-essential \
            cmake \
            libcurl4-openssl-dev \
            libmysqlclient-dev \
            libssl-dev \
            zlib1g-dev

      - name: Install Clang compiler
        if: matrix.compiler == 'clang'
        run: sudo apt install -y --no-install-recommends clang

      - name: Build and install on Ubuntu
        if: matrix.os == 'ubuntu-24.04'
        run: |
          set -euo pipefail
          mkdir -p build _install
          cd build
          cmake ../ \
            -DCMAKE_C_COMPILER="${{ matrix.c_compiler }}" \
            -DCMAKE_CXX_COMPILER="${{ matrix.cxx_compiler }}" \
            -DCMAKE_INSTALL_PREFIX="../_install" \
            -DBUILD_EXTRACTORS=1 \
            -DENABLE_MAILSENDER=1
          make -j"$(nproc)"
          make install

      - name: Build and install on Windows
        if: matrix.os == 'windows-2022'
        shell: bash # Windows runners default to PowerShell.
        run: |
          set -euo pipefail
          # Build cURL.
          cd "$GITHUB_WORKSPACE/dep/windows/optional_dependencies"
          ./curl_download_and_build.bat
          # Build VMaNGOS.
          cd "$GITHUB_WORKSPACE"
          mkdir -p build
          cd build
          cmake -DBUILD_EXTRACTORS=1 -DENABLE_MAILSENDER=1 -G "Visual Studio 17 2022" -A x64 ..
          "/c/Program Files/Microsoft Visual Studio/2022/Enterprise/MSBuild/Current/Bin/MSBuild.exe" "MaNGOS.sln" //p:Platform=x64 //p:Configuration=Release //m
